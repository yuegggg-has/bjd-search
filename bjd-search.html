      align-items: center;
      background: #fff;

      outline: none;

      color: #333;

      background: #fff;

      font-size: 13px;
      color: #555;

      font-size: 12px;
      color: #FF6BAC;
      font-weight: 600;
    }

    .table-wrap { padding: 0 16px 40px; overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #FFBDD9;
      box-shadow: 3px 4px 0 #FFD6E8;
      font-size: 13px;
    }
    thead tr { background: linear-gradient(135deg, #FF9BB5, #FF6BAC); }
    thead th {
      padding: 10px 12px;
      color: #fff;
      font-weight: 700;
      text-align: left;
      white-space: nowrap;
      font-size: 12px;
    }
    tbody tr { border-bottom: 1px solid #FFE8F4; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: #FFF5FA; }
    tbody td { padding: 10px 12px; color: #333; vertical-align: middle; line-height: 1.4; }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .tag-blind { background: #FFE0EE; color: #FF6BAC; }
    .tag-hang  { background: #E8F4FF; color: #4A9EE5; }
    .company-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: #FFF0C0;
      color: #B8860B;
    }
    .spu-link {
      color: #FF6BAC;
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
    }
    .no-result {
      text-align: center;
      padding: 40px;
      color: #ccc;
      font-size: 14px;
    }

</head>

function render(list) {
  const tbody = document.getElementById('tbody');
  const noResult = document.getElementById('noResult');
  document.getElementById('stats').textContent = '共 ' + list.length + ' 款';

  if (list.length === 0) {
    tbody.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';
  tbody.innerHTML = list.map(r => {
    const saleTag = r.saleForm
      ? '<span class="tag ' + (r.saleForm === '盲盒' ? 'tag-blind' : 'tag-hang') + '">' + r.saleForm + '</span>'
      : '-';
    const companyTag = r.company
      ? '<span class="company-tag">' + r.company + '</span>'
      : '-';
    return '<tr>' +
      '<td><span class="spu-link">' + r.name + '</span></td>' +
      '<td>' + saleTag + '</td>' +
      '<td>' + companyTag + '</td>' +
      '</tr>';
  }).join('');
}

function filter() {
  const kw = document.getElementById('search').value.trim().toLowerCase();
  const company = document.getElementById('companyFilter').value;
  const sale = document.getElementById('saleFilter').value;
  const result = DATA.filter(r => {
    const matchKw = !kw ||
      r.name.toLowerCase().includes(kw) ||
      r.ip.toLowerCase().includes(kw) ||
      r.series.toLowerCase().includes(kw);
    const matchCompany = !company || r.company === company;
    const matchSale = !sale || r.saleForm === sale;
    return matchKw && matchCompany && matchSale;
  });
  render(result);
}

document.getElementById('search').addEventListener('input', filter);
document.getElementById('companyFilter').addEventListener('change', filter);
document.getElementById('saleFilter').addEventListener('change', filter);

render(DATA);
</script>
